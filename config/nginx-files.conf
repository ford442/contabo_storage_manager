# nginx-files.conf
# Nginx static file server for contabo_storage_manager.
#
# Serves the contents of /srv/files (mapped from FILES_DIR on the host) with
# correct MIME types and permissive CORS headers so browser apps
# (image_video_effects, flac_player, web_sequencer) can fetch assets directly.
#
# Deployment:
#   docker compose --profile storage up -d
#
# For HTTPS, put a TLS-terminating reverse proxy (Nginx, Caddy, Traefik, etc.)
# in front of port 8080 on the host and proxy to this container on port 80.
# Example Caddy block:
#   storage.yourdomain.com {
#     reverse_proxy localhost:8080
#   }

server {
    listen 80;
    server_name _;

    root /srv/files;
    autoindex off;

    # ── MIME types (extend nginx defaults with audio / MIDI specifics) ─────────
    types {
        # Audio
        audio/flac              flac;
        audio/wav               wav;
        audio/aiff              aiff aif;
        audio/midi              mid midi;
        audio/mpeg              mp3;
        audio/ogg               ogg oga;

        # Video
        video/mp4               mp4 m4v;
        video/webm              webm;

        # Images
        image/jpeg              jpg jpeg;
        image/png               png;
        image/gif               gif;
        image/webp              webp;
        image/svg+xml           svg svgz;

        # Data / config
        application/json        json;
        text/plain              txt;

        # SoundFonts
        application/octet-stream sf2 sf3;
    }
    default_type application/octet-stream;

    # ── CORS headers (required for cross-origin audio/video loads) ─────────────
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;

    # ── Enable Range requests for large audio/video files ──────────────────────
    # (allows browsers to seek within audio/video without re-downloading)

    location / {
        # Handle pre-flight OPTIONS requests quickly
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }

        try_files $uri =404;
    }
}
