# Nginx configuration for Contabo Storage Manager with Model Serving
# Optimized for WebLLM model downloads with range header support

# Map file extensions to MIME types for model files
map $uri $model_mime_type {
    default           application/octet-stream;
    ~\.wasm$          application/wasm;
    ~\.json$          application/json;
    ~\.bin$           application/octet-stream;
    ~\.onnx$          application/octet-stream;
    ~\.safetensors$   application/octet-stream;
    ~\.mlmodel$       application/octet-stream;
}

# CORS configuration
map $request_method $cors_method {
    default '';
    'OPTIONS' 'OPTIONS';
}

server {
    listen 80;
    server_name storage.noahcohn.com;
    
    # Root for static files
    root /data/files;
    
    # Client max body size for uploads
    client_max_body_size 4G;
    
    # Gzip compression for text files (not binary model files)
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript;
    
    # ============================================
    # Model Serving Location (Direct File Access)
    # ============================================
    location /models/ {
        # Alias to models directory
        alias /data/files/models/;
        
        # Enable range requests (essential for WebLLM)
        add_header Accept-Ranges bytes always;
        
        # CORS headers for cross-origin model loading
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, Accept-Ranges, Content-Range, Cache-Control' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range, Accept-Ranges' always;
        
        # Cache headers
        add_header Cache-Control "public, max-age=86400, immutable" always;
        
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range, Accept-Ranges, Content-Range, Cache-Control' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        
        # Set proper MIME types
        default_type application/octet-stream;
        
        # Handle specific file types
        location ~* \.wasm$ {
            add_header Accept-Ranges bytes always;
            add_header Access-Control-Allow-Origin * always;
            add_header Cache-Control "public, max-age=86400, immutable" always;
            types { application/wasm wasm; }
        }
        
        location ~* \.json$ {
            add_header Accept-Ranges bytes always;
            add_header Access-Control-Allow-Origin * always;
            add_header Cache-Control "public, max-age=3600" always;
            types { application/json json; }
        }
        
        # Disable access log for model files (reduce I/O)
        access_log off;
        
        # Optimize sendfile for large binary files
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }
    
    # ============================================
    # API and Webhook Routes (Proxy to FastAPI)
    # ============================================
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        
        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
    }
    
    location /webhook/ {
        proxy_pass http://127.0.0.1:8000/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    
    location /files/ {
        proxy_pass http://127.0.0.1:8000/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable range requests
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }
    
    location /models-api/ {
        proxy_pass http://127.0.0.1:8000/models/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable range requests
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }
    
    # ============================================
    # Health Check
    # ============================================
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
    
    # ============================================
    # Default Location
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS Server (when SSL is configured)
server {
    listen 443 ssl http2;
    server_name storage.noahcohn.com;
    
    # SSL certificates (update paths when using certbot)
    # ssl_certificate /etc/letsencrypt/live/storage.noahcohn.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/storage.noahcohn.com/privkey.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;
    
    # Include all the same locations as HTTP server
    include /etc/nginx/snippets/storage-manager-locations.conf;
}
