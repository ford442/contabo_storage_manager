# Nginx configuration for storage.noahcohn.com
# This proxies to the Python bridge (port 8000) and file server (port 8080)
#
# To enable:
#   sudo cp config/storage.noahcohn.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/storage.noahcohn.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name storage.noahcohn.com;

    # Optional: Redirect HTTP to HTTPS if you have SSL set up
    # return 301 https://$server_name$request_uri;

    # ============================================
    # Proxy to Python FastAPI bridge (port 8000)
    # ============================================
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # Alternative: Direct file serving via nginx-files (port 8080)
    # Uncomment to use nginx-files container instead of Python for static files
    # ============================================
    # location /files/ {
    #     proxy_pass http://localhost:8080/;
    #     proxy_set_header Host $host;
    #     
    #     # Add CORS headers for cross-origin file access
    #     add_header Access-Control-Allow-Origin "*" always;
    #     add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    # }
}

