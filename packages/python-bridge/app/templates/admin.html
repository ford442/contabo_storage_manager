<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>1ink Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2"></script>
  <style>body { font-family: system-ui; } .log { font-family: monospace; }</style>
</head>
<body class="bg-zinc-950 text-white p-8">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold mb-8">🚀 1ink VPS Control Panel</h1>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
      <button hx-post="/api/admin/run?command_key=build-frontend" 
              hx-target="#log-window" 
              class="bg-blue-600 hover:bg-blue-700 px-6 py-4 rounded-xl text-lg font-medium">Build Frontend (npm run build)</button>
      <button hx-post="/api/admin/run?command_key=git-pull" 
              class="bg-blue-600 hover:bg-blue-700 px-6 py-4 rounded-xl text-lg font-medium">Build Frontend (npm run build)</button>
      <button hx-post="/api/admin/run?command_key=npm-install" 
              class="bg-emerald-600 hover:bg-emerald-700 px-6 py-4 rounded-xl text-lg font-medium">NPM Install</button>
      <button hx-post="/api/admin/run?command_key=restart-uvicorn" 
              class="bg-amber-600 hover:bg-amber-700 px-6 py-4 rounded-xl text-lg font-medium">Restart Storage Manager</button>
      <button hx-post="/api/admin/run?command_key=sync-indexes" 
              class="bg-purple-600 hover:bg-purple-700 px-6 py-4 rounded-xl text-lg font-medium">Sync All Indexes</button>
    </div>

    <!-- Live Log Window -->
    <div id="log-window" class="bg-black border border-zinc-800 rounded-2xl p-6 h-96 overflow-auto font-mono text-sm text-emerald-400 log">
      Click any button above — live output appears here...
    </div>

    <!-- AI Agent Section (the fun part) -->
    <div class="mt-12">
      <h2 class="text-2xl mb-3">🤖 AI Agent Command</h2>
      <div class="flex gap-3">
        <input id="ai-input" type="text" placeholder="Type anything... e.g. build frontend and restart" 
               class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">
        <button onclick="sendAICommand()" 
                class="bg-violet-600 hover:bg-violet-700 px-10 rounded-2xl">Send →</button>
      </div>
    </div>
  </div>

  <script>
    function sendAICommand() {
      const input = document.getElementById('ai-input').value;
      // For now we just echo — later we'll call Grok API and map to commands
      alert("AI Agent received: " + input + "\n\n(We’ll wire this to real Grok intelligence next step)");
    }
  </script>
</body>
</html>
